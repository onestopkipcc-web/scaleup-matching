name: 공고 전문 크롤링 (수동 전용)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: '크롤링 건수 (0=전체)'
        required: false
        default: '100'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: |
          pip install requests pandas openpyxl \
                      beautifulsoup4 lxml \
                      google-auth google-auth-oauthlib \
                      playwright
          playwright install chromium --with-deps

      - name: 크롤링 실행
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          CRAWL_LIMIT: ${{ github.event.inputs.limit }}
        run: python crawl_notices.py
