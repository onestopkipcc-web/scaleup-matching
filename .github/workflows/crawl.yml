name: 공고 전문 크롤링

on:
  schedule:
    # 매주 수요일 오전 10시 KST (= UTC 01:00)
    - cron: '0 1 * * 3'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: |
          pip install requests pandas openpyxl \
                      beautifulsoup4 lxml \
                      google-auth google-auth-oauthlib \
                      playwright

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 크롤링 실행
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python crawl_notices.py

      - name: 완료 로그
        if: always()
        run: echo "크롤링 완료 $(date '+%Y-%m-%d %H:%M')"
